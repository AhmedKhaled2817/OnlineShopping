<section class="hero-banner">
  <div class="hero-grid container">
    <div class="hero-copy">
      <span class="hero-badge">Winter Sale</span>
      <h1>Discover &amp; Shop<br /><span>The Best Products</span></h1>
      <p>Find amazing products with exclusive deals and great discounts up to 50% off.</p>

      <div class="hero-actions">
        <p-button label="Shop Now" icon="pi pi-shopping-bag" routerLink="/shop" />
        <p-button label="Watch Video" icon="pi pi-play-circle" [outlined]="true" severity="secondary" />
      </div>
    </div>

    <div class="hero-preview">
      <div class="preview-card">
        <span class="preview-tag">Mega Deal</span>
        <img
          src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=900&q=80"
          alt="Featured lifestyle product"
        />
        <div class="preview-info">
          <p>Featured Product</p>
          <h2>Premium Chair</h2>
          <strong>$249.00</strong>
        </div>
      </div>
    </div>
  </div>
</section>
