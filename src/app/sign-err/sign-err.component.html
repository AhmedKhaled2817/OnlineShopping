<p-dialog
  [(visible)]="isShown"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
  (onHide)="closeErr()"
  header="Sign in required"
  styleClass="auth-prime-dialog"
>
  <p class="dialog-text">Please sign in or create an account to add items to your cart and checkout.</p>
  <div class="dialog-actions">
    <p-button label="Sign in" icon="pi pi-sign-in" (onClick)="signIn()" />
    <p-button label="Create account" icon="pi pi-user-plus" severity="secondary" (onClick)="register()" />
  </div>
</p-dialog>
